<!DOCTYPE html>
<html lang="ka">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>School Cloud Pro</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        :root { --blue: #2563eb; --green: #10b981; --red: #ef4444; --bg: #f0f2f5; }
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: -apple-system, sans-serif; -webkit-tap-highlight-color: transparent; }
        body { background: var(--bg); padding: 15px; color: #1e293b; }
        .container { width: 100%; max-width: 450px; background: white; padding: 25px; border-radius: 25px; box-shadow: 0 5px 20px rgba(0,0,0,0.05); margin: 20px auto; }
        .hidden { display: none !important; }
        
        input, select, button, textarea { width: 100%; padding: 14px; margin: 10px 0; border-radius: 12px; border: 1px solid #ddd; font-size: 16px; outline: none; }
        button { background: var(--blue); color: white; border: none; font-weight: 700; cursor: pointer; transition: 0.2s; }
        button:active { transform: scale(0.98); }

        .sub-card { padding: 20px; border-radius: 18px; margin-bottom: 12px; color: white; cursor: pointer; }
        .history-item { display: flex; align-items: center; justify-content: space-between; background: white; padding: 12px; border-radius: 12px; margin-bottom: 8px; border-left: 5px solid var(--blue); box-shadow: 0 2px 5px rgba(0,0,0,0.05); }
        .comment-tag { font-size: 11px; background: #e2e8f0; padding: 2px 6px; border-radius: 4px; display: block; margin-top: 5px; color: #475569; cursor: pointer; }
        
        .switch { position: relative; display: inline-block; width: 45px; height: 24px; }
        .switch input { opacity: 0; width: 0; height: 0; }
        .slider { position: absolute; cursor: pointer; top: 0; left: 0; right: 0; bottom: 0; background: #ccc; border-radius: 24px; transition: .3s; }
        .slider:before { position: absolute; content: ""; height: 18px; width: 18px; left: 3px; bottom: 3px; background: white; border-radius: 50%; transition: .3s; }
        input:checked + .slider { background: var(--green); }
        input:checked + .slider:before { transform: translateX(21px); }
    </style>
</head>
<body>

<div id="auth-ui" class="container">
    <h2 style="text-align:center; margin-bottom:20px;">🏫 School Portal</h2>
    <input type="email" id="l-email" placeholder="ელ-ფოსტა">
    <input type="password" id="l-pass" placeholder="პაროლი">
    <button onclick="handleLogin()">შესვლა</button>
</div>

<div id="student-ui" class="container hidden">
    <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom: 20px;">
        <h3 id="st-welcome"></h3>
        <button onclick="location.reload()" style="width:auto; padding:5px 12px; background:var(--red); font-size:12px;">გამოსვლა</button>
    </div>
    <div id="st-subjects"></div>
    <div id="st-history" class="hidden">
        <button onclick="closeHistory()" style="background:#94a3b8; margin-bottom:15px;">⬅ უკან</button>
        <div id="calc-area" style="background:var(--blue); color:white; padding:15px; border-radius:15px; margin-bottom:15px; text-align:center;"></div>
        <div id="history-list"></div>
    </div>
</div>

<div id="teacher-ui" class="container hidden">
    <div style="display:flex; justify-content:space-between; align-items:center;">
        <h3>👨‍🏫 მასწავლებლის პანელი</h3>
        <button onclick="location.reload()" style="width:auto; padding:5px 12px; background:var(--red); font-size:12px;">გასვლა</button>
    </div>
    <select id="t-active-sub"></select>
    <input type="date" id="t-date">
    <button onclick="loadClass()">სიის ნახვა</button>
    <div id="t-work" class="hidden">
        <div id="t-students-list" style="margin:15px 0;"></div>
        <textarea id="t-hw" placeholder="საშინაო დავალება ყველასთვის..."></textarea>
        <button onclick="saveJournal()" style="background:var(--green)">შენახვა</button>
    </div>
</div>

<script>
    // ჩაწერე შენი მონაცემები:
    const _supabase = supabase.createClient('https://lzhbxjabyamqzyyjymmg.supabase.co', 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Imx6aGJ4amFieWFtcXp5eWp5bW1nIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Njk3NzIzMjUsImV4cCI6MjA4NTM0ODMyNX0.GXTHQZEkYF32qJUDIdyBCkklsPntt3EjMuyDzdO97MQ');
    
    const colors = ["#FF6B6B", "#4D96FF", "#6BCB77", "#FFD93D", "#9575CD", "#FB8C00", "#00ACC1"];
    const allSubs = ["ქართული", "მათემატიკა", "ბუნება", "ინგლისური", "ისტორია", "გეოგრაფია", "ფიზიკა", "ქიმია", "ბიოლოგია", "ისტ"];
    let currentUser = null;

    async function handleLogin() {
        const email = document.getElementById('l-email').value;
        const pass = document.getElementById('l-pass').value;
        const { data: user, error } = await _supabase.from('users').select('*').eq('email', email).eq('pass', pass).single();
        if(error || !user) return alert("მონაცემები არასწორია!");
        currentUser = user;
        document.getElementById('auth-ui').classList.add('hidden');
        user.role === 'teacher' ? showTeacherPanel() : showStudentPanel();
    }

    // მასწავლებლის ფუნქციები
    function showTeacherPanel() {
        document.getElementById('teacher-ui').classList.remove('hidden');
        const sel = document.getElementById('t-active-sub');
        if(currentUser.subjects) currentUser.subjects.split(',').forEach(s => sel.innerHTML += `<option value="${s.trim()}">${s.trim()}</option>`);
    }

    async function loadClass() {
        if(!document.getElementById('t-date').value) return alert("აირჩიეთ თარიღი!");
        document.getElementById('t-work').classList.remove('hidden');
        const { data: sts } = await _supabase.from('users').select('id, name').eq('role', 'student');
        const list = document.getElementById('t-students-list'); list.innerHTML = "";
        sts.forEach(s => {
            list.innerHTML += `<div style="padding:12px; background:#f8fafc; margin-bottom:8px; border-radius:12px; border:1px solid #e2e8f0;">
                <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:8px;">
                    <span style="font-weight:bold;">${s.name}</span>
                    <label class="switch"><input type="checkbox" id="at-${s.id}" checked><span class="slider"></span></label>
                </div>
                <div style="display:flex; gap:10px;">
                    <input type="number" id="gr-${s.id}" placeholder="ქულა" style="width:70px; margin:0; padding:8px;">
                    <input type="text" id="cm-${s.id}" placeholder="კომენტარი მოსწავლეს..." style="margin:0; padding:8px; font-size:13px;">
                </div>
            </div>`;
        });
    }

    async function saveJournal() {
        const date = document.getElementById('t-date').value;
        const sub = document.getElementById('t-active-sub').value;
        const { data: sts } = await _supabase.from('users').select('id').eq('role', 'student');
        const rows = sts.map(s => ({
            date, subject: sub, student_id: s.id, teacher_name: currentUser.name,
            grade: document.getElementById(`gr-${s.id}`).value || null,
            attending: document.getElementById(`at-${s.id}`).checked,
            comment: document.getElementById(`cm-${s.id}`).value,
            homework: document.getElementById('t-hw').value
        }));
        const { error } = await _supabase.from('journal').upsert(rows);
        error ? alert(error.message) : alert("წარმატებით შეინახა!");
    }

    // მოსწავლის ფუნქციები
    async function showStudentPanel() {
        document.getElementById('student-ui').classList.remove('hidden');
        document.getElementById('st-welcome').innerText = "გამარჯობა, " + currentUser.name;
        const { data: ts } = await _supabase.from('users').select('name, subjects').eq('role', 'teacher');
        const container = document.getElementById('st-subjects'); container.innerHTML = "";
        allSubs.forEach((s, i) => {
            const t = ts ? ts.find(t => t.subjects?.includes(s)) : null;
            container.innerHTML += `<div class="sub-card" style="background:${colors[i%colors.length]}" onclick="openHistory('${s}')">
                <h4>${s}</h4>
                <p style="font-size:12px; opacity:0.9;">👨‍🏫 ${t ? t.name : 'პედაგოგი უცნობია'}</p>
            </div>`;
        });
    }

    async function openHistory(sub) {
        document.getElementById('st-subjects').classList.add('hidden');
        document.getElementById('st-history').classList.remove('hidden');
        const { data: logs } = await _supabase.from('journal').select('*').eq('student_id', currentUser.id).eq('subject', sub).order('date', {ascending: false});
        let sum = 0, count = 0, list = document.getElementById('history-list'); list.innerHTML = "";
        logs.forEach(l => {
            if(l.grade && !isNaN(l.grade)) { sum += parseFloat(l.grade); count++; }
            list.innerHTML += `<div class="history-item">
                <div style="width:100%">
                    <div style="display:flex; justify-content:space-between;">
                        <small>${l.date}</small>
                        <b>${l.grade ? l.grade + ' ქულა' : (l.attending ? 'დასწრება' : '❌')}</b>
                    </div>
                    ${l.comment ? `<span class="comment-tag" onclick="alert('${l.comment}')">💬 მასწავლებლის კომენტარი: ${l.comment.substring(0,20)}...</span>` : ''}
                </div>
            </div>`;
        });
        document.getElementById('calc-area').innerHTML = `<h4>საშუალო: ${count > 0 ? (sum/count).toFixed(1) : 0}</h4>`;
    }

    function closeHistory() { document.getElementById('st-history').classList.add('hidden'); document.getElementById('st-subjects').classList.remove('hidden'); }
</script>
</body>
</html>
