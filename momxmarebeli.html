<!DOCTYPE html>
<html lang="en">
<head>

<body>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<div id="user-chat" style="width:300px; border:1px solid #ccc; padding:15px; border-radius:15px; font-family: sans-serif;">
    <h4 style="margin-top:0;">💬 ჩატი</h4>
    <div id="msg-box" style="height:250px; overflow-y:auto; background:#f4f4f9; margin-bottom:10px; padding:10px; border-radius:10px;"></div>
    <div style="display:flex; gap:5px;">
        <input type="text" id="u-input" placeholder="მიწერეთ..." style="flex:1; padding:8px; border-radius:5px; border:1px solid #ddd;">
        <button onclick="sendUserMsg()" style="padding:8px; background:#2563eb; color:white; border:none; border-radius:5px;">✈</button>
    </div>
</div>

<script>
    const _supabase = supabase.createClient('https://qsrnblcufiesgxlwvscv.supabase.co', 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InFzcm5ibGN1Zmllc2d4bHd2c2N2Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzIyMjY0MTcsImV4cCI6MjA4NzgwMjQxN30.pSQ1w6v6hEVf3BQRDIHG-qJ6n9tiuv0Wcwf3QppRf7k');

    async function sendUserMsg() {
        const text = document.getElementById('u-input').value;
        if(!text.trim()) return;
        await _supabase.from('chat_messages').insert({ sender: 'user', message: text });
        document.getElementById('u-input').value = "";
        loadUserMsgs();
    }

    async function loadUserMsgs() {
        const { data } = await _supabase.from('chat_messages').select('*').order('created_at', { ascending: true });
        const box = document.getElementById('msg-box');
        box.innerHTML = data.map(m => `
            <div style="margin-bottom:8px; text-align: ${m.sender === 'user' ? 'right' : 'left'}">
                <span style="background:${m.sender === 'user' ? '#2563eb' : '#ddd'}; color:${m.sender === 'user' ? 'white' : 'black'}; padding:5px 10px; border-radius:10px; display:inline-block;">
                    ${m.message}
                </span>
            </div>
        `).join('');
        box.scrollTop = box.scrollHeight;
    }
    setInterval(loadUserMsgs, 2000);
</script>
</body>
</html>
